aegis:
  project_name: "Aegis-AI Prototype"
  version: "1.0.0"

  capture:
    mode: "simulation"
    interface: "eth0"
    pcap_file: ""
    pcap_dir: "./data/pcaps"
    filter: "tcp or udp or icmp"
    max_packets: 10000
    promiscuous: true

  processing:
    flow_timeout: 60
    batch_size: 100
    max_flows_in_memory: 1000

  ml:
    models_dir: "./models"
    anomaly_threshold: 0.6
    threat_threshold: 75
    use_xgboost: false
    use_lstm: false
    sequence_window: 10

  api:
    host: "0.0.0.0"
    port: 8000
    dashboard_dir: "./src/dashboard"
    cors_origins: ["*"]

  dashboard:
    live_packet_sample_size: 15
    default_flow_page_size: 50
    default_packet_page_size: 100

  database:
    type: "sqlite"
    path: "./data/aegis.db"

  alerting:
    enabled: true
    formats: ["json", "csv"]
    webhook_url: ""
    email_enabled: false

  simulation:
    enabled: true
    scenarios:
      - normal
      - port_scan
      - dos
      - brute_force
      - data_exfil
      - slow_apt
    interval_ms: 1000

  # Layer 2 monitoring: catches non-IP attack tooling (e.g. Yersinia)
  # that the IP-flow pipeline above can never see, since it operates on
  # ARP/STP/CDP/DTP/VTP frames and raw 802.1Q tags instead of IP flows.
  l2:
    enabled: true
    mode: "simulation"          # "simulation" or "live"
    interface: "eth0"
    thresholds:
      mac_flood_new_macs_per_window: 40
      mac_flood_window_seconds: 10
      cdp_flood_count_per_window: 20
      cdp_flood_window_seconds: 10
      stp_topology_change_count: 5
      stp_topology_change_window_seconds: 10
    simulation:
      scenarios:
        - normal_l2
        - arp_spoof
        - mac_flood
        - stp_attack
        - cdp_flood
        - dtp_negotiation
        - vtp_attack
        - vlan_double_tag
