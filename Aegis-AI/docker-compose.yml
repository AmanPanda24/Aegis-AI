version: '3.8'

services:
  aegis-ai:
    build: .
    container_name: aegis-ai-prototype
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - AEGIS_MODE=simulation
      - PYTHONPATH=/app
    networks:
      - aegis-network
    restart: unless-stopped

networks:
  aegis-network:
    driver: bridge
